[pytest]
# Pytest configuration file for Holos backend tests
# This file configures test discovery, execution options, and test markers

# Test Discovery Configuration
# -----------------------------
# testpaths: Directories to search for test files
# Pytest will recursively search these directories for test files
testpaths = tests

# python_files: File name patterns to identify test files
# Matches files starting with "test_" (e.g., test_auth.py, test_agents.py)
python_files = test_*.py

# python_classes: Class name patterns to identify test classes
# Matches classes starting with "Test" (e.g., TestAuth, TestAgents)
python_classes = Test*

# python_functions: Function name patterns to identify test functions
# Matches functions starting with "test_" (e.g., test_login, test_register)
python_functions = test_*

# Test Execution Options
# ----------------------
# addopts: Additional command-line options applied to all test runs
# These options can be overridden via command line if needed
addopts = 
    -v                    # Verbose output (show test names and results)
    --tb=short            # Short traceback format (concise error output)
    --strict-markers      # Require markers to be registered (prevents typos)

